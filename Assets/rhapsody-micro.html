            .hero-cta {

<style>
   
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem;
        background-color: #000000;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border-radius: 25px;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 79%; /* Reduced from 95% to 80% */
        max-width: 1000px; /* Reduced from 1200px to 1000px */
        z-index: 1000;
        margin: 0 auto;
    }

    /* Ensure the content below the navbar is not hidden */
    body {
        padding-top: calc(20px + 1.5rem * 2 + 40px); /* 20px top + navbar height + extra space */
        font-family: 'Helvetica Neue', Arial, sans-serif; /* Adding a fucking nice font family */
    }
    
    
    .navbar-logo img {
        height: 40px;
    }

    .navbar-items {
        display: flex;
        list-style-type: none;
    }

    .navbar-items li {
        margin: 0 1.5rem;
    }

    .navbar-items a {
        text-decoration: none;
        color: #ffffff;
        font-weight: 500;
        transition: color 0.3s ease;
    }

    .navbar-items a:hover {
        color: #007bff;
    }

    .navbar-button {
        padding: 0.75rem 1.5rem;
        background-color: #ffffff;
        color: rgb(0, 0, 0);
        border: none;
        font-family: 'Helvetica Neue', Arial, sans-serif !important;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-size: 1rem;
        width: 100px; /* Set a fixed width to maintain button size */
        height: 42px;
        position: relative;
    }

    .navbar-button::before {
        content: "\2709"; /* Black envelope icon */
        position: absolute;
        font-size: 1.8rem;
        left: -30px;
        transition: all 0.3s ease;
    }

    .navbar-button::after {
        content: "Contact";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        transition: all 0.3s ease;
    }

    .navbar-button:hover {
        background-color: #0deb2a;
        color: #000000;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);

    }

    .navbar-button:hover::before {
        left: 50%;
        transform: translateX(-50%) translateY(-5%);
    }

    .navbar-button:hover::after {
        opacity: 0;
    }

    /* MOBILE MENU */
    .mobile-menu {
        display: none;
    }
    .mobile-menu-button {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 50px;
        background-color: rgb(0, 0, 0);
        color: white;
        border: 2px solid white;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1.2rem;
        transition: all 0.3s ease-in-out;
        z-index: 1000;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        text-align: center;
        line-height: 50px;
    }

    .mobile-menu-button::before {
        content: "\2630"; /* Hamburger icon */
        transition: all 0.3s ease-in-out;
    }

    .mobile-menu-button:hover {
        width: 120px;
        background-color: rgb(0, 0, 0);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    }

    .mobile-menu-button:hover::before {
        content: "Menu";
    }


    @keyframes wobbleAndSlideDown {
        0% { transform: translateX(-50%) rotate(0deg); }
        15% { transform: translateX(-52%) rotate(-5deg); }
        30% { transform: translateX(-48%) rotate(3deg); }
        45% { transform: translateX(-51%) rotate(-3deg); }
        60% { transform: translateX(-49%) rotate(2deg); }
        75% { transform: translateX(-50%) rotate(-1deg); }
        100% { transform: translateX(-50%) translateY(100px) rotate(0deg); }
    }

    .mobile-menu-button.active {
        animation: wobbleAndSlideDown 0.6s ease-in-out forwards;
        opacity: 0;
        transition: opacity 0.3s ease-in-out 0.3s;
    }
    .mobile-menu-close {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        padding: 0.75rem 1.5rem;
        background-color: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50px;
        cursor: pointer;
        font-size: 1.2rem;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        z-index: 1000;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 50px;
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .mobile-menu-close:hover {
        background-color: rgba(255, 59, 48, 0.2);
        color: #ff3b30;
        transform: translateX(-50%) translateY(95px);
        box-shadow: 0 8px 15px rgba(255, 59, 48, 0.2);
        width: auto;
        padding: 0.75rem 1.5rem;
    }

    .mobile-menu-close::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at center, rgba(255, 59, 48, 0.2) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.3s ease;
        border-radius: 50px;
    }

    .mobile-menu-close:hover::before {
        opacity: 1;
    }

    @keyframes modernPulseAndExpand {
        0% { 
            transform: translateX(-50%) translateY(100px) scale(1);
            width: 50px;
        }
        50% { 
            transform: translateX(-50%) translateY(95px) scale(1.05);
            width: auto;
        }
        100% { 
            transform: translateX(-50%) translateY(100px) scale(1);
            width: auto;
        }
    }

    .mobile-menu-close:hover {
        animation: modernPulseAndExpand 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .mobile-menu-close::after {
        content: 'Close';
        opacity: 0;
        width: 0;
        overflow: hidden;
        transition: opacity 0.3s ease, width 0.3s ease;
    }

    .mobile-menu-close:hover::after {
        opacity: 1;
        width: auto;
        margin-left: 8px;
    }

    @keyframes bounceAndSlideUp {
        0% { transform: translateX(-50%) translateY(100px); }
        20% { transform: translateX(-50%) translateY(80px); }
        40% { transform: translateX(-50%) translateY(95px); }
        60% { transform: translateX(-50%) translateY(85px); }
        80% { transform: translateX(-50%) translateY(92px); }
        100% { transform: translateX(-50%) translateY(0); }
    }

    .mobile-menu-close.active {
        animation: bounceAndSlideUp 0.7s ease-in-out 0.2s forwards;
        opacity: 1;
        transition: opacity 0.3s ease-in-out;
    }
    .mobile-menu-drawer {
        position: fixed;
        bottom: 20px;
        left: 50%;
        width: 0;
        height: 0;
        background-color: rgba(0, 0, 0, 0.8);
        overflow: hidden;
        z-index: 999;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.2);
        opacity: 0;
        border-radius: 50%;
        transform: translate(-50%, 50%);
        transition: all 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .mobile-menu-drawer.active {
        width: 100vw;
        height: 100vh;
        opacity: 1;
        bottom: 0;
        border-radius: 0;
        transform: translate(-50%, 0);
        transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                    height 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                    border-radius 0.3s ease-out;
    }

    @keyframes expandDrawer {
        0% {
            width: 0;
            height: 0;
            border-radius: 50%;
        }
        50% {
            width: 120vw;
            height: 120vh;
            border-radius: 30%;
        }
        100% {
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }
    }

    .mobile-menu-drawer::before {
        content: '';
        position: absolute;
        top: 45%;
        left: 50%;
        width: 10px;
        height: 10px;
        background-color: rgba(0, 0, 0, 0.8);
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0);
        transition: transform 0.3s ease-out;
    }

    .mobile-menu-drawer.active::before {
        transform: translate(-50%, -50%) scale(200);
        opacity: 0;
        transition: transform 0.3s ease-out, opacity 0.3s ease-out;
    }

    @keyframes fadeInContent {
        0% { 
            opacity: 0; 
            transform: translateY(30px) scale(0.9) rotateX(20deg);
            filter: blur(15px);
        }
        100% { 
            opacity: 1; 
            transform: translateY(0) scale(1) rotateX(0deg);
            filter: blur(0);
        }
    }

    .mobile-menu-drawer.active > * {
        animation: fadeInContent 1.5s cubic-bezier(0.25, 0.1, 0.25, 1) 0.4s forwards;
        opacity: 0;
        filter: blur(15px);
        transform-origin: center top;
        will-change: opacity, transform, filter;
    }

    .mobile-menu-drawer ul {
        list-style-type: none;
        padding: 2rem;
        margin: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transform: translateY(30px) scale(0.95);
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mobile-menu-drawer.active ul {
        opacity: 1;
        transform: translateY(0) scale(1);
    }

    .mobile-menu-drawer li {
        margin-bottom: 2rem;
        opacity: 0;
        transform: translateX(-20px);
        transition: opacity 0.5s ease-out, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        transition-delay: calc(0.1s * var(--item-index, 0));
    }

    .mobile-menu-drawer.active li {
        opacity: 1;
        transform: translateX(0);
    }

    .mobile-menu-drawer a {
        text-decoration: none;
        color: #ffffff;
        font-size: 1.6rem;
        font-weight: 500;
        letter-spacing: 0.5px;
        transition: all 0.3s ease-in-out;
        position: relative;
        padding-bottom: 5px;
    }

    .mobile-menu-drawer a::after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: 0;
        left: 0;
        background-color: #ffffff;
        transition: width 0.3s ease-in-out;
    }

    .mobile-menu-drawer a:hover {
        color: #ffffff;
        transform: translateY(-3px);
    }

    .mobile-menu-drawer a:hover::after {
        width: 100%;
    }

    @media (max-width: 768px) {
        .navbar {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 400px;
            background-color: rgb(0, 0, 0);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 10px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .navbar-logo {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .navbar-logo img {
            height: 30px;
            display: block;
        }

        .navbar-items {
            display: none;
        }

        .navbar-button {
            display: none
        }

        .mobile-menu {
            display: block;
        }
    }

    
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const menuButton = document.querySelector('.mobile-menu-button');
        const closeButton = document.createElement('button');
        closeButton.classList.add('mobile-menu-close');
        closeButton.textContent = 'X';
        document.body.appendChild(closeButton);

        const menuDrawer = document.createElement('div');
        menuDrawer.classList.add('mobile-menu-drawer');
        menuDrawer.innerHTML = `
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        `;
        document.body.appendChild(menuDrawer);

        menuButton.addEventListener('click', function() {
            menuButton.classList.add('active');
            setTimeout(() => {
                closeButton.classList.add('active');
                menuDrawer.classList.add('active');
            }, 300);
        });

        closeButton.addEventListener('click', function() {
            closeButton.classList.remove('active');
            menuDrawer.classList.remove('active');
            setTimeout(() => {
                menuButton.classList.remove('active');
            }, 300);
        });
    });
</script>
